site_name: PlusMin documentatie

theme:
  name: mkdocs
  custom_dir: custom_theme/

plugins:
  - search
  - git-revision-date
  - glightbox
  - autorefs

extra_css:
  - img/custom.css

nav:
  - Home: index.md
  - Motivatietheorie: 2-motivatietheorie.md
  - Stand: 5-stand.md
  - Woordenlijst: 8-woordenlijst.md

# Configure Markdown TOC to include levels 2 and deeper (exclude H1)
markdown_extensions:
  - toc:
      toc_depth: '2-6'